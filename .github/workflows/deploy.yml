name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint (api + web)
        run: npm run lint

      - name: Build web
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          # Provide dummy values so Next.js build doesn't fail on missing env
          BACKEND_API_URL: "http://localhost:4000"
        run: npm run build --workspace web

  # ──────────────────────────────────────────────────────────────────────────
  deploy-api:
    name: Deploy API → Fly.io
    needs: lint-and-build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API
        run: |
          flyctl deploy \
            --config apps/api/fly.toml \
            --dockerfile apps/api/Dockerfile \
            --remote-only \
            --wait-timeout 120
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  # ──────────────────────────────────────────────────────────────────────────
  deploy-web:
    name: Deploy Web → Fly.io
    needs: deploy-api
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Web
        run: |
          flyctl deploy \
            --config apps/web/fly.toml \
            --dockerfile apps/web/Dockerfile \
            --remote-only \
            --wait-timeout 120
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

# ────────────────────────────────────────────────────────────────────────────
# GitHub Actions secrets required (Settings → Secrets → Actions):
#
# FLY_API_TOKEN           — from `fly tokens create deploy`
#
# Fly.io app secrets (set once via `fly secrets set -a agritech-api ...`):
#   JWT_SECRET            — strong random string
#   DATABASE_URL          — postgresql://... (Fly Postgres or Supabase)
#   REDIS_URL             — redis://... (Upstash or Fly Redis)
#   STRIPE_SECRET_KEY     — sk_live_...
#   STRIPE_WEBHOOK_SECRET — whsec_...
#   STRIPE_PRICE_PRO      — price_...
#   STRIPE_PRICE_ENTERPRISE — price_...
#   S3_BUCKET / S3_ENDPOINT / S3_ACCESS_KEY_ID / S3_SECRET_ACCESS_KEY
#   WEB_APP_URL           — https://agritech-web.fly.dev
#
# Fly.io app secrets (set once via `fly secrets set -a agritech-web ...`):
#   BACKEND_API_URL       — https://agritech-api.fly.dev
#   JWT_SECRET            — same value as API
