services:
  postgres:
    image: postgres:16-alpine
    container_name: agritech-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agritech
      POSTGRES_USER: agritech
      POSTGRES_PASSWORD: agritech
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agritech-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  pgadmin:
    image: dpage/pgadmin4:8.11
    container_name: agritech-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@agritech.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  postgres_data:
  redis_data:
