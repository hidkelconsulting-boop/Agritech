# fly.toml — Agritech API (Fastify)
# Deploy: fly deploy --config apps/api/fly.toml --dockerfile apps/api/Dockerfile

app = "agritech-api"
primary_region = "cdg"   # Paris — change to your preferred region

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  NODE_ENV    = "production"
  API_PORT    = "4000"
  APP_ENV     = "production"
  S3_REGION   = "auto"

[http_service]
  internal_port       = 4000
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 500
    soft_limit = 300

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"

[checks]
  [checks.health]
    grace_period = "10s"
    interval     = "30s"
    method       = "GET"
    path         = "/health"
    port         = 4000
    timeout      = "5s"
    type         = "http"

# Secrets to set via `fly secrets set`:
# fly secrets set \
#   JWT_SECRET="..." \
#   DATABASE_URL="postgresql://..." \
#   REDIS_URL="redis://..." \
#   STRIPE_SECRET_KEY="sk_live_..." \
#   STRIPE_WEBHOOK_SECRET="whsec_..." \
#   STRIPE_PRICE_PRO="price_..." \
#   STRIPE_PRICE_ENTERPRISE="price_..." \
#   OPENAI_API_KEY="sk-..."
#   S3_BUCKET="..." \
#   S3_ENDPOINT="https://<account>.r2.cloudflarestorage.com" \
#   S3_ACCESS_KEY_ID="..." \
#   S3_SECRET_ACCESS_KEY="..." \
#   WEB_APP_URL="https://agritech-web.fly.dev"
