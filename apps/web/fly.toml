# fly.toml — Agritech Web (Next.js)
# Deploy: fly deploy --config apps/web/fly.toml --dockerfile apps/web/Dockerfile

app = "agritech-web"
primary_region = "cdg"

[build]
  dockerfile = "apps/web/Dockerfile"

[env]
  NODE_ENV               = "production"
  NEXT_TELEMETRY_DISABLED = "1"

[http_service]
  internal_port       = 3000
  force_https         = true
  auto_stop_machines  = true
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type       = "requests"
    hard_limit = 500
    soft_limit = 300

[[vm]]
  size   = "shared-cpu-1x"
  memory = "512mb"

# Secrets to set via `fly secrets set`:
# fly secrets set \
#   BACKEND_API_URL="https://agritech-api.fly.dev" \
#   JWT_SECRET="..."   # same value as API
